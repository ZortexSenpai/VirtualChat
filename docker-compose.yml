services:
  virtualchat:
    image: ghcr.io/zortexsenpai/virtualchat:latest
    container_name: virtualchat
    restart: unless-stopped
    ports:
      - 8080:80
    networks:
      - frontend
    environment:
      - KLIPY_API_KEY=${VITE_KLIPY_API_KEY:-}
      - DEFAULT_HOMESERVER=${VITE_DEFAULT_HOMESERVER:-}
      - LOCK_HOMESERVER=${VITE_LOCK_HOMESERVER:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.virtualchat.rule=Host(`virtualchat.example.com`)"
      - "traefik.http.routers.virtualchat.entrypoints=websecure"
      - "traefik.http.routers.virtualchat.tls.certresolver=letsencrypt"
      - "traefik.http.services.virtualchat.loadbalancer.server.port=80"

networks:
  frontend:
    external: true
